name: Ragent CI and GHCR Release

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ragent-ci-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify source and deployment contract
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile backend and test sources
        run: |
          chmod +x ./mvnw
          ./mvnw -B -ntp -pl bootstrap -am clean test-compile

      - name: Package backend without environment-bound integration execution
        run: |
          chmod +x ./mvnw
          ./mvnw -B -ntp -pl bootstrap -am -DskipTests package

      - name: Document backend test boundary
        run: |
          {
            echo "## Backend verification boundary"
            echo
            echo "- Backend main sources and test sources are compiled with \`clean test-compile\`."
            echo "- Backend packaging runs with \`-DskipTests package\` so the deployable artifact is built without executing environment-bound Spring integration tests."
            echo "- Environment-dependent Spring integration tests are not executed in this workflow; they depend on Redis, vector stores, databases, or model services and should run in a later dedicated Integration Test pipeline or prepared environment."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Render image-first runtime Compose
        run: >-
          docker compose
          --env-file deploy/compose/.env.example
          -f deploy/compose/compose.runtime.yaml
          config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image without push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: false
          tags: ragent-api:ci

      - name: Build Web image without push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.web
          push: false
          tags: ragent-web:ci

  publish:
    name: Publish immutable GHCR images
    needs: verify
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image namespace
        shell: bash
        run: |
          echo "GHCR_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
          echo "API_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/arugsragent-api" >> "$GITHUB_ENV"
          echo "WEB_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/arugsragent-web" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: true
          tags: ${{ env.API_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=ragent-api
          cache-to: type=gha,mode=max,scope=ragent-api

      - name: Build and publish Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.web
          push: true
          tags: ${{ env.WEB_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=ragent-web
          cache-to: type=gha,mode=max,scope=ragent-web

      - name: Publish release handoff summary
        shell: bash
        run: |
          {
            echo "## Immutable Ragent images"
            echo
            echo "- Release SHA: \`${GITHUB_SHA}\`"
            echo "- API: \`${API_IMAGE}:${GITHUB_SHA}\`"
            echo "- Web: \`${WEB_IMAGE}:${GITHUB_SHA}\`"
            echo
            echo "Deployment is handed off to the production server after both immutable images are published."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy published release to production
    needs: publish
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Validate production SSH secrets
        shell: bash
        run: |
          test -n "${{ secrets.PROD_HOST }}" || { echo "Missing secret: PROD_HOST" >&2; exit 1; }
          test -n "${{ secrets.PROD_USER }}" || { echo "Missing secret: PROD_USER" >&2; exit 1; }
          test -n "${{ secrets.PROD_SSH_PORT }}" || { echo "Missing secret: PROD_SSH_PORT" >&2; exit 1; }
          test -n "${{ secrets.PROD_SSH_KEY }}" || { echo "Missing secret: PROD_SSH_KEY" >&2; exit 1; }

      - name: Install SSH key
        shell: bash
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' '${{ secrets.PROD_SSH_KEY }}' > ~/.ssh/ragent_prod_key
          chmod 0600 ~/.ssh/ragent_prod_key
          if test -n '${{ secrets.PROD_SSH_KNOWN_HOSTS }}'; then
            printf '%s\n' '${{ secrets.PROD_SSH_KNOWN_HOSTS }}' > ~/.ssh/known_hosts
          else
            ssh-keyscan -p '${{ secrets.PROD_SSH_PORT }}' '${{ secrets.PROD_HOST }}' > ~/.ssh/known_hosts
          fi
          chmod 0644 ~/.ssh/known_hosts

      - name: Deploy release on production server
        shell: bash
        run: |
          ssh \
            -i ~/.ssh/ragent_prod_key \
            -p '${{ secrets.PROD_SSH_PORT }}' \
            '${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}' \
            '/opt/ragent/bin/deploy-release.sh "${{ github.sha }}"'

      - name: Record deployment summary
        shell: bash
        run: |
          {
            echo "## Production deployment"
            echo
            echo "- Release SHA: \`${GITHUB_SHA}\`"
            echo "- Server: \`${{ secrets.PROD_HOST }}\`"
            echo "- Entrypoint: \`/opt/ragent/bin/deploy-release.sh ${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"
